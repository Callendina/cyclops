# Grafana config for the Cyclops dev/staging stack.
#
# Dev stack runs with anonymous editor access — there's no Gatekeeper in
# front of it locally. The staging/prod deployment will replace this with
# auth.proxy backed by gatekeeper headers (DESIGN.md §9). The other knobs
# here (allow_embedding, kiosk-friendly settings) are stable across both.

[server]
root_url = %(protocol)s://%(domain)s:%(http_port)s/
serve_from_sub_path = false

[security]
allow_embedding = true
cookie_secure = false
cookie_samesite = lax

[auth]
disable_login_form = true
disable_signout_menu = true

[auth.anonymous]
enabled = true
org_role = Editor

[auth.basic]
enabled = false

[users]
auto_assign_org_role = Editor
default_theme = dark

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[dashboards]
default_home_dashboard_path =

[unified_alerting]
enabled = false

[log]
level = warn
