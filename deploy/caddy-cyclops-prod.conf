# Caddy fragment for the prod cyclops stack.
#
# Deploy: sudo cp this file to /etc/caddy/conf.d/cyclops-prod.conf on the
# prod Linode (vispay-prod.callendina.com), then sudo systemctl reload caddy.
#
# Mirrors deploy/caddy-cyclops-staging.conf with prod hostnames + ports.
# Routes:
#   /_auth/*           → gatekeeper (no forward_auth, that's the auth endpoint itself)
#   /health            → cyclops-ui (no auth — Caddy bypass for liveness probes)
#   /grafana/*         → grafana, behind gatekeeper forward_auth
#   /corkboard/*       → corkboard, behind gatekeeper forward_auth
#   /api/dev/*         → cyclops-ui JSON API, behind gatekeeper (X-API-Key works too)
#   /loki/api/v1/push  → Loki push endpoint, behind gatekeeper API-key
#                          auth (cross-host log shipping; scout #93)
#   /                  → cyclops-ui catch-all, behind gatekeeper

cyclops.callendina.com {
    handle /_auth/* {
        reverse_proxy localhost:9100
    }

    # Liveness probe — bypass Gatekeeper so external probes succeed.
    handle /health {
        reverse_proxy localhost:9300
    }

    handle /grafana/* {
        forward_auth localhost:9100 {
            uri /_auth/verify
            header_up X-Forwarded-API-Key {header.X-API-Key}
            copy_headers X-Gatekeeper-User X-Gatekeeper-Role X-Gatekeeper-Group X-Gatekeeper-System-Admin
        }
        reverse_proxy localhost:3000
    }

    handle /corkboard/* {
        forward_auth localhost:9100 {
            uri /_auth/verify
            header_up X-Forwarded-API-Key {header.X-API-Key}
            copy_headers X-Gatekeeper-User X-Gatekeeper-Role X-Gatekeeper-Group X-Gatekeeper-System-Admin
        }
        reverse_proxy localhost:9200
    }

    handle /api/dev/* {
        forward_auth localhost:9100 {
            uri /_auth/verify
            header_up X-Forwarded-API-Key {header.X-API-Key}
            copy_headers X-Gatekeeper-User X-Gatekeeper-Role X-Gatekeeper-Group X-Gatekeeper-System-Admin
        }
        reverse_proxy localhost:9300
    }

    # Loki push endpoint for cross-host log shipping (scout-alloy on the
    # staging Linode pushes scout's prod events here). Auth is by
    # Gatekeeper-issued service-API-key, validated through the same
    # forward_auth pattern as the other routes — issuer's identity ends
    # up in Caddy's audit trail. See scout corkboard #93.
    handle /loki/api/v1/push {
        forward_auth localhost:9100 {
            uri /_auth/verify
            header_up X-Forwarded-API-Key {header.X-API-Key}
            copy_headers X-Gatekeeper-User X-Gatekeeper-Role X-Gatekeeper-Group X-Gatekeeper-System-Admin
        }
        reverse_proxy localhost:3100
    }

    handle {
        forward_auth localhost:9100 {
            uri /_auth/verify
            header_up X-Forwarded-API-Key {header.X-API-Key}
            copy_headers X-Gatekeeper-User X-Gatekeeper-Role X-Gatekeeper-Group X-Gatekeeper-System-Admin
        }
        reverse_proxy localhost:9300
    }
}
